<div id="xp-container" style="width: 100%; max-width: 400px; font-family: 'Segoe UI', sans-serif; margin: 20px auto; padding: 15px; border-radius: 12px; background: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;">
        <span id="cefr-level" style="font-size: 1.2rem; font-weight: 800; color: #6366f1;">Level: A2</span>
        <span id="xp-text" style="font-size: 0.9rem; font-weight: 600; color: #475569;">0 / 1500 XP</span>
    </div>
    
    <div style="background: #e2e8f0; height: 18px; border-radius: 9px; overflow: hidden; border: 1px solid #cbd5e1;">
        <div id="xp-bar" style="background: linear-gradient(90deg, #f59e0b, #fbbf24); width: 0%; height: 100%; transition: width 1.5s ease-in-out;"></div>
    </div>
</div>

<script>
    const url = "https://script.google.com/macros/s/AKfycbxjzpK2FTdMmVIWCdSS8ZwbuKmWBgyoFG1JVkXmsjDO7ujCxqqmsHM4pHPm2DWvoJc7/exec"; // Dán URL của bạn vào đây

    fetch(url)
        .then(response => response.json())
        .then(data => {
            const currentXP = data.score; // Giả sử điểm bài làm là XP
            const targetXP = 1500; // Mốc B1
            const percent = Math.min((currentXP / targetXP) * 100, 100);
            
            // Cập nhật text
            document.getElementById('xp-text').innerText = `${currentXP} / ${targetXP} XP`;
            document.getElementById('xp-bar').style.width = percent + "%";
            
            // Logic cập nhật Level
            if (currentXP >= 1500) {
                document.getElementById('cefr-level').innerText = "Level: B1";
                document.getElementById('cefr-level').style.color = "#10b981"; // Màu xanh cho B1
            }
        });
</script>
